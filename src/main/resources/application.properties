# Nome da aplicação
spring.application.name=demo-time

# Configurações do Banco de Dados H2 (Em memória)
spring.datasource.url=jdbc:h2:mem:timedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o Console do H2 (Acesse via: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configurações do Hibernate/JPA
# update: cria as tabelas se elas não existirem e altera se você mudar a @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true